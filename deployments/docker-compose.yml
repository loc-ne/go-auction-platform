services:
  postgres:
    image: postgres:17-alpine
    container_name: auth-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: auth_db
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
  
  postgres-product:
    image: postgres:17-alpine
    container_name: product-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: product_db
    volumes:
      - product-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  postgres-bidding:
    image: postgres:17-alpine
    container_name: bidding-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: bidding_db
    volumes:
      - bidding-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  auth-service:
    image: golang:1.24-alpine
    container_name: auth-service
    working_dir: /app
    volumes:
      - ..:/app
    command: go run services/auth/cmd/main.go
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgres://${DB_USER:-admin}:${DB_PASSWORD:-123456}@postgres:5432/${DB_NAME:-auth_db}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key}
      - AUTH_PORT=${AUTH_PORT:-8001}
      - MIGRATION_PATH=file://services/auth/migrations
    depends_on:
      - postgres

  api-gateway:
    image: golang:1.24-alpine
    container_name: api-gateway
    working_dir: /app
    volumes:
      - ..:/app
    command: go run services/api-gateway/cmd/main.go
    ports:
      - "${GATEWAY_PORT:-8080}:${GATEWAY_PORT:-8080}"
    environment:
      - GATEWAY_PORT=${GATEWAY_PORT:-8080}
      - AUTH_SERVICE_URL=http://auth-service:${AUTH_PORT:-8001}
    depends_on:
      - auth-service
  
  redis:
    image: redis:7-alpine
    container_name: shared-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-123456}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a $${REDIS_PASSWORD:-123456} ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  auth-postgres-data:
  product-postgres-data:
  bidding-postgres-data:
  redis_data:
